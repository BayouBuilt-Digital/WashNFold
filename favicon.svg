<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="100%" stop-color="#7CC444"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Glass bubble decorations -->
  <circle cx="50" cy="10" r="5.5" fill="white" opacity="0.25"/>
  <circle cx="57" cy="20" r="3" fill="white" opacity="0.18"/>
  <circle cx="9" cy="48" r="5" fill="white" opacity="0.2"/>
  <circle cx="17" cy="55" r="2.5" fill="white" opacity="0.12"/>
  <circle cx="44" cy="53" r="3.5" fill="white" opacity="0.15"/>
  <circle cx="11" cy="13" r="3.5" fill="white" opacity="0.1"/>
  <!-- Water swirl accents -->
  <path d="M14 44 Q24 34 32 44 Q40 54 50 44" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M18 50 Q26 42 33 50 Q40 58 48 50" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" opacity="0.3"/>
  <!-- "W" in white, "NF" in white -->
  <text x="32" y="34" text-anchor="middle" font-family="'Nunito', sans-serif" font-weight="800" font-size="22" fill="#FFFFFF"><tspan>W</tspan><tspan>NF</tspan></text>
