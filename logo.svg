<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 110">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&amp;display=swap');
  </style>
  <!-- "Fresh" in sky blue -->
  <text x="148" y="62" text-anchor="end"
        font-family="'Nunito', sans-serif" font-weight="800"
        font-size="54" fill="#64B5F6">Fresh</text>
  <!-- "NFold" in lime green -->
  <text x="150" y="62" text-anchor="start"
        font-family="'Nunito', sans-serif" font-weight="800"
        font-size="54" fill="#7CC444">NFold</text>
  <!-- Laundry subtitle (much smaller) -->
  <text x="210" y="90" text-anchor="middle"
        font-family="'Nunito', sans-serif" font-weight="400"
        font-size="14" letter-spacing="8" fill="#6B7280">LAUNDRY</text>
</svg>
