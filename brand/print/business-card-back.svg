<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 200" width="350" height="200">
  <!-- Business Card Back — QR code side -->
  <defs>
    <linearGradient id="dbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFCFF"/><stop offset="100%" stop-color="#F0F7FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#64B5F6"/><stop offset="100%" stop-color="#7CC444"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64B5F6"/><stop offset="100%" stop-color="#7CC444"/>
    </linearGradient>
    <radialGradient id="ga" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/><stop offset="25%" stop-color="#64B5F6" stop-opacity="0.14"/>
      <stop offset="65%" stop-color="#7CC444" stop-opacity="0.06"/><stop offset="100%" stop-color="#7CC444" stop-opacity="0.02"/>
    </radialGradient>
  </defs>
  <rect width="350" height="200" rx="8" fill="url(#dbg)"/>
  <rect y="197" width="350" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Decorative bubbles -->
  <circle cx="30" cy="30" r="22" fill="url(#ga)" stroke="#64B5F6" stroke-width="1" stroke-opacity="0.25"/>
  <ellipse cx="21" cy="20" rx="7" ry="4.5" fill="#FFFFFF" opacity="0.12" transform="rotate(-20,21,20)"/>
  <circle cx="320" cy="170" r="20" fill="url(#ga)" stroke="#7CC444" stroke-width="1" stroke-opacity="0.25"/>
  <ellipse cx="312" cy="162" rx="6.5" ry="4" fill="#FFFFFF" opacity="0.12" transform="rotate(-18,312,162)"/>
  <circle cx="315" cy="30" r="12" fill="url(#ga)" stroke="#7CC444" stroke-width="0.7" stroke-opacity="0.2"/>
  <circle cx="35" cy="170" r="10" fill="url(#ga)" stroke="#64B5F6" stroke-width="0.7" stroke-opacity="0.2"/>

  <!-- QR code placeholder -->
  <rect x="120" y="30" width="110" height="110" rx="12" fill="url(#mark)" opacity="0.15" stroke="url(#accent)" stroke-width="1.5"/>
  <text x="175" y="90" text-anchor="middle" font-family="'Nunito', sans-serif" font-weight="900" font-size="14" fill="#6B7280">QR CODE</text>
  <text x="175" y="108" text-anchor="middle" font-family="'Nunito', sans-serif" font-weight="600" font-size="8" fill="#9CB8C8">PLACE HERE</text>

  <!-- Scan CTA -->
  <text x="175" y="162" text-anchor="middle" font-family="'Nunito', sans-serif" font-weight="800" font-size="10" letter-spacing="3" fill="#3BA0B5">SCAN TO BOOK</text>
  <text x="175" y="180" text-anchor="middle" font-family="'Nunito', sans-serif" font-weight="600" font-size="8" letter-spacing="1" fill="#9CB8C8">washnfold.com</text>
</svg>
