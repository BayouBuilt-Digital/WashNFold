<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 500" width="580" height="500">
  <!-- WashNFold — Bag Print Layout -->
  <!-- FOR: Natural cotton bags, white shirts -->
  <!-- Style: Glassmorphism — large floating iridescent bubbles -->

  <defs>
    <linearGradient id="mark-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="100%" stop-color="#7CC444"/>
    </linearGradient>
    <radialGradient id="glass-a" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="25%" stop-color="#64B5F6" stop-opacity="0.14"/>
      <stop offset="65%" stop-color="#7CC444" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#7CC444" stop-opacity="0.02"/>
    </radialGradient>
    <radialGradient id="glass-b" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="30%" stop-color="#64B5F6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#64B5F6" stop-opacity="0.02"/>
    </radialGradient>
    <radialGradient id="glass-g" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="30%" stop-color="#7CC444" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7CC444" stop-opacity="0.02"/>
    </radialGradient>
  </defs>

  <!-- ═══ LARGE GLASS BUBBLES ═══ -->

  <!-- Large #1 — top left -->
  <circle cx="55" cy="55" r="45" fill="url(#glass-a)" stroke="#64B5F6" stroke-width="1.5" stroke-opacity="0.3"/>
  <ellipse cx="36" cy="32" rx="15" ry="10" fill="#FFFFFF" opacity="0.18" transform="rotate(-22,36,32)"/>
  <circle cx="30" cy="26" r="4.5" fill="#FFFFFF" opacity="0.3"/>

  <!-- Large #2 — top right -->
  <circle cx="525" cy="60" r="40" fill="url(#glass-g)" stroke="#7CC444" stroke-width="1.5" stroke-opacity="0.3"/>
  <ellipse cx="509" cy="40" rx="13" ry="8.5" fill="#FFFFFF" opacity="0.16" transform="rotate(-18,509,40)"/>
  <circle cx="503" cy="34" r="4" fill="#FFFFFF" opacity="0.28"/>

  <!-- Large #3 — left mid -->
  <circle cx="48" cy="240" r="38" fill="url(#glass-b)" stroke="#64B5F6" stroke-width="1.4" stroke-opacity="0.28"/>
  <ellipse cx="32" cy="220" rx="12" ry="8" fill="#FFFFFF" opacity="0.15" transform="rotate(-20,32,220)"/>
  <circle cx="27" cy="215" r="3.5" fill="#FFFFFF" opacity="0.25"/>

  <!-- Large #4 — right mid -->
  <circle cx="535" cy="250" r="35" fill="url(#glass-a)" stroke="#7CC444" stroke-width="1.3" stroke-opacity="0.28"/>
  <ellipse cx="520" cy="232" rx="11" ry="7.5" fill="#FFFFFF" opacity="0.14" transform="rotate(-15,520,232)"/>
  <circle cx="515" cy="227" r="3.5" fill="#FFFFFF" opacity="0.24"/>

  <!-- Large #5 — bottom left -->
  <circle cx="70" cy="435" r="42" fill="url(#glass-g)" stroke="#7CC444" stroke-width="1.5" stroke-opacity="0.3"/>
  <ellipse cx="52" cy="414" rx="14" ry="9" fill="#FFFFFF" opacity="0.16" transform="rotate(-20,52,414)"/>
  <circle cx="46" cy="408" r="4" fill="#FFFFFF" opacity="0.26"/>

  <!-- Large #6 — bottom right -->
  <circle cx="515" cy="430" r="38" fill="url(#glass-b)" stroke="#64B5F6" stroke-width="1.4" stroke-opacity="0.28"/>
  <ellipse cx="499" cy="412" rx="12" ry="8" fill="#FFFFFF" opacity="0.15" transform="rotate(-18,499,412)"/>
  <circle cx="493" cy="406" r="3.5" fill="#FFFFFF" opacity="0.26"/>

  <!-- Large #7 — behind icon mark -->
  <circle cx="370" cy="85" r="30" fill="url(#glass-a)" stroke="#3BA0B5" stroke-width="1.2" stroke-opacity="0.25"/>
  <ellipse cx="358" cy="70" rx="10" ry="6.5" fill="#FFFFFF" opacity="0.12" transform="rotate(-18,358,70)"/>
  <circle cx="353" cy="66" r="3" fill="#FFFFFF" opacity="0.22"/>

  <!-- ═══ MEDIUM BUBBLES ═══ -->

  <circle cx="140" cy="38" r="16" fill="url(#glass-b)" stroke="#64B5F6" stroke-width="1" stroke-opacity="0.22"/>
  <ellipse cx="133" cy="30" rx="4.5" ry="3" fill="#FFFFFF" opacity="0.1" transform="rotate(-15,133,30)"/>

  <circle cx="450" cy="150" r="14" fill="url(#glass-g)" stroke="#7CC444" stroke-width="0.9" stroke-opacity="0.22"/>

  <circle cx="130" cy="330" r="13" fill="url(#glass-a)" stroke="#3BA0B5" stroke-width="0.9" stroke-opacity="0.2"/>

  <circle cx="470" cy="350" r="15" fill="url(#glass-b)" stroke="#64B5F6" stroke-width="1" stroke-opacity="0.22"/>

  <circle cx="290" cy="470" r="12" fill="url(#glass-g)" stroke="#7CC444" stroke-width="0.8" stroke-opacity="0.2"/>

  <circle cx="160" cy="170" r="11" fill="url(#glass-g)" stroke="#7CC444" stroke-width="0.8" stroke-opacity="0.18"/>

  <circle cx="430" cy="420" r="14" fill="url(#glass-a)" stroke="#3BA0B5" stroke-width="0.9" stroke-opacity="0.2"/>

  <circle cx="380" cy="470" r="10" fill="url(#glass-b)" stroke="#64B5F6" stroke-width="0.7" stroke-opacity="0.18"/>

  <!-- ═══ ICON MARK with washer ═══ -->
  <rect x="190" y="30" width="200" height="200" rx="44" fill="url(#mark-bg)"/>
  <g transform="translate(202,38) scale(1.0)">
    <rect x="20" y="12" width="136" height="160" rx="16" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
    <line x1="20" y1="44" x2="156" y2="44" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
    <circle cx="52" cy="29" r="5" fill="none" stroke="#FFFFFF" stroke-width="2.2" opacity="0.7"/>
    <circle cx="88" cy="29" r="5" fill="none" stroke="#FFFFFF" stroke-width="2.2" opacity="0.7"/>
    <circle cx="124" cy="29" r="5" fill="none" stroke="#FFFFFF" stroke-width="2.2" opacity="0.7"/>
    <circle cx="88" cy="110" r="52" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" opacity="0.95"/>
    <circle cx="88" cy="110" r="46" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.35"/>
    <circle cx="88" cy="103" r="14" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity="0.6"/>
    <circle cx="68" cy="92" r="8" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.45"/>
    <circle cx="110" cy="95" r="7" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.45"/>
    <circle cx="72" cy="128" r="6" fill="none" stroke="#FFFFFF" stroke-width="1.8" opacity="0.35"/>
    <path d="M60 140 Q68 132 76 140" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <path d="M96 142 Q104 134 112 142" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- ═══ WORDMARK ═══ -->
  <text x="258" y="310" text-anchor="end"
        font-family="'Nunito', sans-serif" font-weight="900"
        font-size="80" fill="#1B3A4B">Wash</text>
  <text x="264" y="310" text-anchor="start"
        font-family="'Nunito', sans-serif" font-weight="900"
        font-size="80" fill="#7CC444">NFold</text>

  <!-- LAUNDRY -->
  <text x="290" y="352" text-anchor="middle"
        font-family="'Nunito', sans-serif" font-weight="400"
        font-size="20" letter-spacing="14" fill="#6B7280">LAUNDRY</text>

  <!-- Divider -->
  <rect x="230" y="376" width="120" height="2" rx="1" fill="#64B5F6" opacity="0.3"/>

  <!-- Tagline -->
  <text x="290" y="410" text-anchor="middle"
        font-family="'Nunito', sans-serif" font-weight="700"
        font-size="14" letter-spacing="4" fill="#3BA0B5">PICKUP &amp; DELIVERY</text>

  <!-- Slogan -->
  <text x="290" y="448" text-anchor="middle"
        font-family="'Nunito', sans-serif" font-weight="800"
        font-size="13" letter-spacing="3" fill="#1B3A4B">DIRTY CLOTHES OUT · CLEAN CLOTHES IN</text>

  <!-- Location -->
  <text x="290" y="474" text-anchor="middle"
        font-family="'Nunito', sans-serif" font-weight="600"
        font-size="11" letter-spacing="2" fill="#6B7280">MAURICE, LOUISIANA</text>
</svg>
