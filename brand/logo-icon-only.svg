      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="100%" stop-color="#7CC444"/>
    </linearGradient>
  </defs>

  <!-- Rounded square -->
  <rect x="10" y="10" width="180" height="180" rx="40" fill="url(#mark-bg)"/>

  <!-- Glass bubbles -->
  <circle cx="152" cy="36" r="14" fill="#fff" opacity="0.25"/>
  <circle cx="172" cy="58" r="8" fill="#fff" opacity="0.18"/>
  <circle cx="32" cy="148" r="13" fill="#fff" opacity="0.2"/>
  <circle cx="50" cy="168" r="7" fill="#fff" opacity="0.12"/>
  <circle cx="140" cy="162" r="10" fill="#fff" opacity="0.15"/>
  <circle cx="30" cy="42" r="9" fill="#fff" opacity="0.1"/>

  <!-- Water swirl -->
  <path d="M42 140 Q72 112 100 140 Q128 168 158 140" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" opacity="0.55"/>
  <path d="M52 156 Q76 136 98 156 Q120 176 144 156" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.25"/>

  <!-- WNF -->
