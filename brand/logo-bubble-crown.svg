<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" width="560" height="300">
  <!-- Logo Option D: Bubble crown — arc of bubbles above the wordmark -->

  <defs>
    <radialGradient id="bubble-glass" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#64B5F6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7CC444" stop-opacity="0.04"/>
    </radialGradient>
  </defs>

  <!-- Arc of bubbles above text — crown shape -->
  <!-- Center large -->
  <circle cx="280" cy="42" r="28" fill="url(#bubble-glass)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <ellipse cx="270" cy="30" rx="8" ry="5.5" fill="#FFFFFF" opacity="0.3" transform="rotate(-18,240,30)"/>
  <circle cx="266" cy="26" r="3" fill="#FFFFFF" opacity="0.45"/>

  <!-- Left arc -->
  <circle cx="175" cy="28" r="20" fill="url(#bubble-glass)" stroke="rgba(100,181,246,0.35)" stroke-width="1.2"/>
  <ellipse cx="168" cy="20" rx="5.5" ry="3.5" fill="#FFFFFF" opacity="0.25" transform="rotate(-15,168,20)"/>

  <circle cx="115" cy="50" r="14" fill="url(#bubble-glass)" stroke="rgba(100,181,246,0.3)" stroke-width="1"/>
  <ellipse cx="110" cy="44" rx="4" ry="2.5" fill="#FFFFFF" opacity="0.2" transform="rotate(-12,110,44)"/>

  <circle cx="75" cy="82" r="9" fill="url(#bubble-glass)" stroke="rgba(100,181,246,0.2)" stroke-width="0.8"/>

  <!-- Right arc -->
  <circle cx="325" cy="28" r="20" fill="url(#bubble-glass)" stroke="rgba(124,196,68,0.35)" stroke-width="1.2"/>
  <ellipse cx="318" cy="20" rx="5.5" ry="3.5" fill="#FFFFFF" opacity="0.25" transform="rotate(-15,318,20)"/>

  <circle cx="385" cy="50" r="14" fill="url(#bubble-glass)" stroke="rgba(124,196,68,0.3)" stroke-width="1"/>
  <ellipse cx="380" cy="44" rx="4" ry="2.5" fill="#FFFFFF" opacity="0.2" transform="rotate(-12,380,44)"/>

  <circle cx="425" cy="82" r="9" fill="url(#bubble-glass)" stroke="rgba(124,196,68,0.2)" stroke-width="0.8"/>

  <!-- Tiny accent bubbles -->
  <circle cx="145" cy="18" r="6" fill="url(#bubble-glass)" stroke="rgba(255,255,255,0.15)" stroke-width="0.6"/>
  <circle cx="355" cy="18" r="6" fill="url(#bubble-glass)" stroke="rgba(255,255,255,0.15)" stroke-width="0.6"/>
  <circle cx="210" cy="14" r="5" fill="url(#bubble-glass)" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
  <circle cx="290" cy="14" r="5" fill="url(#bubble-glass)" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>

  <!-- Wordmark -->
  <text x="248" y="150" text-anchor="end"
        font-family="'Nunito', sans-serif" font-weight="900"
        font-size="80" fill="#1B3A4B">Wash</text>
  <text x="252" y="150" text-anchor="start"
        font-family="'Nunito', sans-serif" font-weight="900"
        font-size="80" fill="#7CC444">NFold</text>

  <!-- Subtitle -->
  <text x="280" y="190" text-anchor="middle"
        font-family="'Nunito', sans-serif" font-weight="400"
        font-size="18" letter-spacing="12" fill="#6B7280">LAUNDRY</text>

  <text x="280" y="230" text-anchor="middle"
        font-family="'Nunito', sans-serif" font-weight="700"
        font-size="12" letter-spacing="3" fill="#3BA0B5">PICKUP &amp; DELIVERY · MAURICE, LA</text>

  <text x="280" y="270" text-anchor="middle"
        font-family="'Nunito', sans-serif" font-weight="800"
        font-size="11" letter-spacing="2.5" fill="#1B3A4B">DIRTY CLOTHES OUT · CLEAN CLOTHES IN</text>
</svg>
