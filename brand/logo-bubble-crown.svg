<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" width="560" height="300">
  <!-- Logo Option D: Bubble crown — arc of bubbles above wordmark -->
  <!-- FOR: White shirts, natural cotton bags -->

  <defs>
    <radialGradient id="bubble-blue" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#64B5F6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#64B5F6" stop-opacity="0.03"/>
    </radialGradient>
    <radialGradient id="bubble-green" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#7CC444" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7CC444" stop-opacity="0.03"/>
    </radialGradient>
    <radialGradient id="bubble-mix" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#64B5F6" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#7CC444" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7CC444" stop-opacity="0.03"/>
    </radialGradient>
  </defs>

  <!-- Crown arc — center large -->
  <circle cx="280" cy="42" r="28" fill="url(#bubble-mix)" stroke="#3BA0B5" stroke-width="1.8" stroke-opacity="0.45"/>
  <ellipse cx="270" cy="30" rx="8" ry="5.5" fill="#64B5F6" opacity="0.12" transform="rotate(-18,270,30)"/>
  <circle cx="266" cy="26" r="3" fill="#64B5F6" opacity="0.25"/>

  <!-- Left arc — blue -->
  <circle cx="195" cy="28" r="20" fill="url(#bubble-blue)" stroke="#64B5F6" stroke-width="1.5" stroke-opacity="0.4"/>
  <ellipse cx="188" cy="20" rx="5.5" ry="3.5" fill="#64B5F6" opacity="0.1" transform="rotate(-15,188,20)"/>

  <circle cx="125" cy="50" r="14" fill="url(#bubble-blue)" stroke="#64B5F6" stroke-width="1.2" stroke-opacity="0.35"/>
  <ellipse cx="120" cy="44" rx="4" ry="2.5" fill="#64B5F6" opacity="0.08" transform="rotate(-12,120,44)"/>

  <circle cx="80" cy="80" r="9" fill="url(#bubble-blue)" stroke="#64B5F6" stroke-width="0.8" stroke-opacity="0.25"/>

  <!-- Right arc — green -->
  <circle cx="365" cy="28" r="20" fill="url(#bubble-green)" stroke="#7CC444" stroke-width="1.5" stroke-opacity="0.4"/>
  <ellipse cx="358" cy="20" rx="5.5" ry="3.5" fill="#7CC444" opacity="0.1" transform="rotate(-15,358,20)"/>

  <circle cx="435" cy="50" r="14" fill="url(#bubble-green)" stroke="#7CC444" stroke-width="1.2" stroke-opacity="0.35"/>
  <ellipse cx="430" cy="44" rx="4" ry="2.5" fill="#7CC444" opacity="0.08" transform="rotate(-12,430,44)"/>

  <circle cx="480" cy="80" r="9" fill="url(#bubble-green)" stroke="#7CC444" stroke-width="0.8" stroke-opacity="0.25"/>

  <!-- Tiny accents -->
  <circle cx="155" cy="18" r="6" fill="url(#bubble-blue)" stroke="#64B5F6" stroke-width="0.6" stroke-opacity="0.2"/>
  <circle cx="405" cy="18" r="6" fill="url(#bubble-green)" stroke="#7CC444" stroke-width="0.6" stroke-opacity="0.2"/>
  <circle cx="235" cy="14" r="5" fill="url(#bubble-blue)" stroke="#64B5F6" stroke-width="0.5" stroke-opacity="0.15"/>
  <circle cx="325" cy="14" r="5" fill="url(#bubble-green)" stroke="#7CC444" stroke-width="0.5" stroke-opacity="0.15"/>

  <!-- Wordmark -->
  <text x="248" y="150" text-anchor="end"
        font-family="'Nunito', sans-serif" font-weight="900"
        font-size="80" fill="#1B3A4B">Wash</text>
  <text x="252" y="150" text-anchor="start"
        font-family="'Nunito', sans-serif" font-weight="900"
        font-size="80" fill="#7CC444">NFold</text>

  <!-- Subtitle -->
  <text x="280" y="190" text-anchor="middle"
        font-family="'Nunito', sans-serif" font-weight="400"
        font-size="18" letter-spacing="12" fill="#6B7280">LAUNDRY</text>

  <text x="280" y="230" text-anchor="middle"
        font-family="'Nunito', sans-serif" font-weight="700"
        font-size="12" letter-spacing="3" fill="#3BA0B5">PICKUP &amp; DELIVERY · MAURICE, LA</text>

  <text x="280" y="270" text-anchor="middle"
        font-family="'Nunito', sans-serif" font-weight="800"
        font-size="11" letter-spacing="2.5" fill="#1B3A4B">DIRTY CLOTHES OUT · CLEAN CLOTHES IN</text>
</svg>
