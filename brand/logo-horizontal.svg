<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <!-- WashNFold — Horizontal Print Logo -->
  <!-- FOR: White shirts, natural cotton bags -->
  <!-- Dark Navy "Wash" + Brand Green "NFold" + Gray subtitle -->

  <!-- Favicon mark -->
  <defs>
    <linearGradient id="mark-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="100%" stop-color="#7CC444"/>
    </linearGradient>
  </defs>

  <!-- Icon mark -->
  <rect x="10" y="30" width="120" height="120" rx="26" fill="url(#mark-bg)"/>
  <!-- Glass bubbles on mark -->
  <circle cx="100" cy="50" r="9" fill="#64B5F6" opacity="0.12"/>
  <circle cx="113" cy="65" r="5" fill="#7CC444" opacity="0.1"/>
  <circle cx="28" cy="120" r="8" fill="#64B5F6" opacity="0.1"/>
  <circle cx="42" cy="135" r="4" fill="#7CC444" opacity="0.08"/>
  <circle cx="90" cy="132" r="6" fill="#64B5F6" opacity="0.08"/>
  <!-- Water swirl on mark -->
  <path d="M32 110 Q52 94 70 110 Q88 126 108 110" fill="none" stroke="#64B5F6" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
  <path d="M38 120 Q54 108 68 120 Q82 132 98 120" fill="none" stroke="#64B5F6" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
  <!-- WNF text on mark -->
  <text x="70" y="100" text-anchor="middle" font-family="'Nunito', sans-serif" font-weight="900" font-size="38" fill="#FFFFFF">WNF</text>

  <!-- Wordmark -->
  <text x="310" y="115" text-anchor="end"
        font-family="'Nunito', sans-serif" font-weight="900"
        font-size="72" fill="#1B3A4B">Wash</text>
  <text x="314" y="115" text-anchor="start"
        font-family="'Nunito', sans-serif" font-weight="900"
        font-size="72" fill="#7CC444">NFold</text>

  <!-- Subtitle -->
  <text x="390" y="148" text-anchor="middle"
        font-family="'Nunito', sans-serif" font-weight="400"
        font-size="16" letter-spacing="10" fill="#6B7280">LAUNDRY</text>

  <!-- Tagline -->
  <text x="390" y="172" text-anchor="middle"
        font-family="'Nunito', sans-serif" font-weight="600"
        font-size="11" letter-spacing="3" fill="#3BA0B5">PICKUP &amp; DELIVERY · MAURICE, LA</text>
</svg>
