<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" width="400" height="420">
  <!-- WashNFold — Stacked Print Logo -->
  <!-- FOR: White shirts, natural cotton bags -->

  <defs>
    <linearGradient id="mark-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="100%" stop-color="#7CC444"/>
    </linearGradient>
  </defs>

  <!-- Icon mark — centered -->
  <rect x="130" y="20" width="140" height="140" rx="30" fill="url(#mark-bg)"/>
  <!-- Glass bubbles -->
  <circle cx="234" cy="46" r="10" fill="#64B5F6" opacity="0.12"/>
  <circle cx="250" cy="64" r="6" fill="#7CC444" opacity="0.1"/>
  <circle cx="150" cy="128" r="9" fill="#64B5F6" opacity="0.1"/>
  <circle cx="164" cy="144" r="5" fill="#7CC444" opacity="0.08"/>
  <circle cx="224" cy="140" r="7" fill="#64B5F6" opacity="0.08"/>
  <!-- Water swirl -->
  <path d="M156 124 Q180 104 200 124 Q220 144 244 124" fill="none" stroke="#64B5F6" stroke-width="4.5" stroke-linecap="round" opacity="0.55"/>
  <path d="M164 136 Q182 120 198 136 Q214 152 232 136" fill="none" stroke="#64B5F6" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
  <!-- WNF -->
  <text x="200" y="108" text-anchor="middle" font-family="'Nunito', sans-serif" font-weight="900" font-size="44" fill="#FFFFFF">WNF</text>

  <!-- Wordmark — stacked below icon -->
  <text x="174" y="240" text-anchor="end"
        font-family="'Nunito', sans-serif" font-weight="900"
        font-size="68" fill="#1B3A4B">Wash</text>
  <text x="178" y="240" text-anchor="start"
        font-family="'Nunito', sans-serif" font-weight="900"
        font-size="68" fill="#7CC444">NFold</text>

  <!-- Subtitle -->
  <text x="200" y="276" text-anchor="middle"
        font-family="'Nunito', sans-serif" font-weight="400"
        font-size="18" letter-spacing="12" fill="#6B7280">LAUNDRY</text>

  <!-- Divider -->
  <rect x="150" y="296" width="100" height="2" rx="1" fill="#64B5F6" opacity="0.3"/>

  <!-- Tagline -->
  <text x="200" y="326" text-anchor="middle"
        font-family="'Nunito', sans-serif" font-weight="600"
        font-size="12" letter-spacing="3" fill="#3BA0B5">PICKUP &amp; DELIVERY</text>
  <text x="200" y="348" text-anchor="middle"
        font-family="'Nunito', sans-serif" font-weight="600"
        font-size="12" letter-spacing="3" fill="#3BA0B5">MAURICE, LOUISIANA</text>

  <!-- Service area -->
  <text x="200" y="390" text-anchor="middle"
        font-family="'Nunito', sans-serif" font-weight="700"
        font-size="10" letter-spacing="2" fill="#6B7280">DIRTY CLOTHES OUT · CLEAN CLOTHES IN</text>
</svg>
