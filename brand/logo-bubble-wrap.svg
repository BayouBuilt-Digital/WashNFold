<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 280" width="560" height="280">
  <!-- Logo Option C: Bubbles wrapping both sides — blue left, green right -->
  <!-- FOR: White shirts, natural cotton bags -->

  <defs>
    <radialGradient id="bubble-blue" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#64B5F6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#64B5F6" stop-opacity="0.03"/>
    </radialGradient>
    <radialGradient id="bubble-green" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#7CC444" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7CC444" stop-opacity="0.03"/>
    </radialGradient>
  </defs>

  <!-- Wordmark -->
  <text x="248" y="130" text-anchor="end"
        font-family="'Nunito', sans-serif" font-weight="900"
        font-size="80" fill="#1B3A4B">Wash</text>
  <text x="252" y="130" text-anchor="start"
        font-family="'Nunito', sans-serif" font-weight="900"
        font-size="80" fill="#7CC444">NFold</text>

  <!-- Left cluster — blue bubbles -->
  <circle cx="48" cy="75" r="32" fill="url(#bubble-blue)" stroke="#64B5F6" stroke-width="2" stroke-opacity="0.45"/>
  <ellipse cx="38" cy="63" rx="9" ry="6" fill="#64B5F6" opacity="0.12" transform="rotate(-20,38,63)"/>
  <circle cx="34" cy="58" r="3" fill="#64B5F6" opacity="0.25"/>

  <circle cx="30" cy="130" r="20" fill="url(#bubble-blue)" stroke="#64B5F6" stroke-width="1.5" stroke-opacity="0.35"/>
  <ellipse cx="24" cy="123" rx="5.5" ry="3.5" fill="#64B5F6" opacity="0.1" transform="rotate(-15,24,123)"/>

  <circle cx="70" cy="40" r="14" fill="url(#bubble-blue)" stroke="#64B5F6" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="15" cy="50" r="9" fill="url(#bubble-blue)" stroke="#64B5F6" stroke-width="0.8" stroke-opacity="0.25"/>

  <!-- Right cluster — green bubbles -->
  <circle cx="500" cy="85" r="30" fill="url(#bubble-green)" stroke="#7CC444" stroke-width="2" stroke-opacity="0.45"/>
  <ellipse cx="490" cy="73" rx="8.5" ry="5.5" fill="#7CC444" opacity="0.12" transform="rotate(-18,490,73)"/>
  <circle cx="486" cy="68" r="3" fill="#7CC444" opacity="0.25"/>

  <circle cx="520" cy="145" r="18" fill="url(#bubble-green)" stroke="#7CC444" stroke-width="1.5" stroke-opacity="0.35"/>
  <ellipse cx="514" cy="138" rx="5" ry="3" fill="#7CC444" opacity="0.1" transform="rotate(-15,514,138)"/>

  <circle cx="478" cy="40" r="12" fill="url(#bubble-green)" stroke="#7CC444" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="540" cy="70" r="8" fill="url(#bubble-green)" stroke="#7CC444" stroke-width="0.8" stroke-opacity="0.25"/>

  <!-- Subtitle -->
  <text x="280" y="170" text-anchor="middle"
        font-family="'Nunito', sans-serif" font-weight="400"
        font-size="18" letter-spacing="12" fill="#6B7280">LAUNDRY</text>

  <text x="280" y="210" text-anchor="middle"
        font-family="'Nunito', sans-serif" font-weight="700"
        font-size="12" letter-spacing="3" fill="#3BA0B5">PICKUP &amp; DELIVERY · MAURICE, LA</text>

  <text x="280" y="250" text-anchor="middle"
        font-family="'Nunito', sans-serif" font-weight="800"
        font-size="11" letter-spacing="2.5" fill="#1B3A4B">DIRTY CLOTHES OUT · CLEAN CLOTHES IN</text>
</svg>
