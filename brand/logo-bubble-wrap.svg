<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 280" width="560" height="280">
  <!-- Logo Option C: Bubbles wrapping around both sides of text -->

  <defs>
    <radialGradient id="bubble-glass" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#64B5F6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7CC444" stop-opacity="0.04"/>
    </radialGradient>
  </defs>

  <!-- Wordmark -->
  <text x="248" y="130" text-anchor="end"
        font-family="Arial, Helvetica, sans-serif" font-weight="900"
        font-size="80" fill="#1B3A4B">Wash</text>
  <text x="252" y="130" text-anchor="start"
        font-family="Arial, Helvetica, sans-serif" font-weight="900"
        font-size="80" fill="#7CC444">NFold</text>

  <!-- Left cluster — blue-tinted bubbles near "W" -->
  <circle cx="48" cy="75" r="32" fill="url(#bubble-glass)" stroke="rgba(100,181,246,0.4)" stroke-width="1.5"/>
  <ellipse cx="38" cy="63" rx="9" ry="6" fill="#FFFFFF" opacity="0.3" transform="rotate(-20,38,63)"/>
  <circle cx="34" cy="58" r="3" fill="#FFFFFF" opacity="0.45"/>

  <circle cx="30" cy="130" r="20" fill="url(#bubble-glass)" stroke="rgba(100,181,246,0.3)" stroke-width="1"/>
  <ellipse cx="24" cy="123" rx="5.5" ry="3.5" fill="#FFFFFF" opacity="0.25" transform="rotate(-15,24,123)"/>

  <circle cx="70" cy="40" r="14" fill="url(#bubble-glass)" stroke="rgba(100,181,246,0.25)" stroke-width="0.8"/>
  <circle cx="15" cy="50" r="9" fill="url(#bubble-glass)" stroke="rgba(100,181,246,0.2)" stroke-width="0.7"/>

  <!-- Right cluster — green-tinted bubbles near "d" -->
  <circle cx="452" cy="85" r="30" fill="url(#bubble-glass)" stroke="rgba(124,196,68,0.4)" stroke-width="1.5"/>
  <ellipse cx="442" cy="73" rx="8.5" ry="5.5" fill="#FFFFFF" opacity="0.3" transform="rotate(-18,442,73)"/>
  <circle cx="438" cy="68" r="3" fill="#FFFFFF" opacity="0.45"/>

  <circle cx="470" cy="135" r="18" fill="url(#bubble-glass)" stroke="rgba(124,196,68,0.3)" stroke-width="1"/>
  <ellipse cx="464" cy="128" rx="5" ry="3" fill="#FFFFFF" opacity="0.22" transform="rotate(-15,464,128)"/>

  <circle cx="430" cy="40" r="12" fill="url(#bubble-glass)" stroke="rgba(124,196,68,0.25)" stroke-width="0.8"/>
  <circle cx="485" cy="65" r="8" fill="url(#bubble-glass)" stroke="rgba(124,196,68,0.2)" stroke-width="0.7"/>

  <!-- Subtitle -->
  <text x="280" y="170" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif" font-weight="400"
        font-size="18" letter-spacing="12" fill="#6B7280">LAUNDRY</text>

  <text x="280" y="210" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif" font-weight="700"
        font-size="12" letter-spacing="3" fill="#3BA0B5">PICKUP &amp; DELIVERY · MAURICE, LA</text>

  <text x="280" y="250" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif" font-weight="800"
        font-size="11" letter-spacing="2.5" fill="#1B3A4B">DIRTY CLOTHES OUT · CLEAN CLOTHES IN</text>
</svg>
