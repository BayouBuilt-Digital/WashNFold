<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170 170" width="170" height="170">
  <!-- Facebook / Instagram Profile Picture — 170x170 -->
  <defs>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64B5F6"/><stop offset="100%" stop-color="#7CC444"/>
    </linearGradient>
    <radialGradient id="ga" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/><stop offset="25%" stop-color="#64B5F6" stop-opacity="0.14"/>
      <stop offset="65%" stop-color="#7CC444" stop-opacity="0.06"/><stop offset="100%" stop-color="#7CC444" stop-opacity="0.02"/>
    </radialGradient>
  </defs>
  <rect width="170" height="170" rx="85" fill="url(#mark)"/>

  <!-- Glass bubbles -->
  <circle cx="132" cy="30" r="18" fill="url(#ga)" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.3"/>
  <ellipse cx="126" cy="22" rx="5" ry="3.5" fill="#FFFFFF" opacity="0.2" transform="rotate(-18,126,22)"/>
  <circle cx="30" cy="130" r="15" fill="url(#ga)" stroke="#FFFFFF" stroke-width="0.8" stroke-opacity="0.25"/>
  <circle cx="145" cy="120" r="10" fill="url(#ga)" stroke="#FFFFFF" stroke-width="0.7" stroke-opacity="0.2"/>
  <circle cx="25" cy="40" r="12" fill="url(#ga)" stroke="#FFFFFF" stroke-width="0.7" stroke-opacity="0.2"/>

  <!-- Water swirl -->
  <path d="M40 120 Q65 100 85 120 Q105 140 130 120" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" opacity="0.45"/>
  <path d="M48 132 Q68 116 84 132 Q100 148 120 132" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.2"/>

  <!-- WNF -->
  <text x="85" y="100" text-anchor="middle" font-family="'Nunito', sans-serif" font-weight="900" font-size="48" fill="#FFFFFF">WNF</text>
</svg>
