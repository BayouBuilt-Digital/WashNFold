  <circle cx="76" cy="140" r="8" fill="#FFFFFF" opacity="0.3"/>

  <circle cx="960" cy="350" r="75" fill="url(#gg)" stroke="#7CC444" stroke-width="2" stroke-opacity="0.28"/>
