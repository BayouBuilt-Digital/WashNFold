  <ellipse cx="74" cy="1608" rx="26" ry="16" fill="#FFFFFF" opacity="0.15" transform="rotate(-20,74,1608)"/>
  <circle cx="66" cy="1598" r="7" fill="#FFFFFF" opacity="0.25"/>

