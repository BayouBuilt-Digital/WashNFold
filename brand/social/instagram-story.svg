  <circle cx="160" cy="900" r="35" fill="url(#gg)" stroke="#7CC444" stroke-width="1.3" stroke-opacity="0.22"/>
  <circle cx="920" cy="1200" r="30" fill="url(#ga)" stroke="#3BA0B5" stroke-width="1.2" stroke-opacity="0.2"/>
  <circle cx="140" cy="1300" r="28" fill="url(#gb)" stroke="#64B5F6" stroke-width="1" stroke-opacity="0.2"/>
  <circle cx="800" cy="160" r="25" fill="url(#gg)" stroke="#7CC444" stroke-width="1" stroke-opacity="0.18"/>
  <circle cx="300" cy="1800" r="22" fill="url(#ga)" stroke="#3BA0B5" stroke-width="0.9" stroke-opacity="0.18"/>
  <circle cx="780" cy="1800" r="20" fill="url(#gb)" stroke="#64B5F6" stroke-width="0.9" stroke-opacity="0.16"/>

