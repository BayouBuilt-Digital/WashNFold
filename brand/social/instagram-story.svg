  <circle cx="650" cy="638" r="30" fill="#FFFFFF" opacity="0.2"/>
  <circle cx="692" cy="686" r="18" fill="#FFFFFF" opacity="0.12"/>
  <circle cx="380" cy="910" r="28" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="416" cy="948" r="14" fill="#FFFFFF" opacity="0.1"/>
  <path d="M400 860 Q480 790 540 860 Q600 930 680 860" fill="none" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" opacity="0.4"/>
  <path d="M422 894 Q488 838 540 894 Q592 950 658 894" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" opacity="0.2"/>
  <text x="540" y="826" text-anchor="middle" font-family="'Nunito', sans-serif" font-weight="900" font-size="120" fill="#FFFFFF">WNF</text>

  <!-- Wordmark -->
  <text x="490" y="1120" text-anchor="end" font-family="'Nunito', sans-serif" font-weight="900" font-size="130" fill="#FFFFFF">Wash</text>
  <text x="500" y="1120" text-anchor="start" font-family="'Nunito', sans-serif" font-weight="900" font-size="130" fill="#7CC444">NFold</text>
  <text x="540" y="1190" text-anchor="middle" font-family="'Nunito', sans-serif" font-weight="400" font-size="32" letter-spacing="18" fill="rgba(255,255,255,0.5)">LAUNDRY</text>

  <!-- Taglines -->
  <text x="540" y="1320" text-anchor="middle" font-family="'Nunito', sans-serif" font-weight="700" font-size="28" letter-spacing="5" fill="#3BA0B5">PICKUP &amp; DELIVERY</text>
  <text x="540" y="1370" text-anchor="middle" font-family="'Nunito', sans-serif" font-weight="700" font-size="28" letter-spacing="5" fill="#3BA0B5">MAURICE, LOUISIANA</text>

  <text x="540" y="1460" text-anchor="middle" font-family="'Nunito', sans-serif" font-weight="800" font-size="22" letter-spacing="4" fill="rgba(255,255,255,0.35)">DIRTY CLOTHES OUT · CLEAN CLOTHES IN</text>
