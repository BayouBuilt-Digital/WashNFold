<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280" width="500" height="280">
  <!-- Logo Option A: Large glass bubble centered over the "N" -->

  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="100%" stop-color="#7CC444"/>
    </linearGradient>
    <radialGradient id="bubble-glass" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#64B5F6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7CC444" stop-opacity="0.04"/>
    </radialGradient>
  </defs>

  <!-- "Wash" in dark navy -->
  <text x="210" y="130" text-anchor="end"
        font-family="Arial, Helvetica, sans-serif" font-weight="900"
        font-size="80" fill="#1B3A4B">Wash</text>

  <!-- "NFold" in brand green -->
  <text x="214" y="130" text-anchor="start"
        font-family="Arial, Helvetica, sans-serif" font-weight="900"
        font-size="80" fill="#7CC444">NFold</text>

  <!-- Large glass bubble — centered over the N, extending past it -->
  <circle cx="240" cy="95" r="62" fill="url(#bubble-glass)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <!-- Bubble highlight -->
  <ellipse cx="222" cy="72" rx="18" ry="12" fill="#FFFFFF" opacity="0.3" transform="rotate(-20,222,72)"/>
  <!-- Small shine dot -->
  <circle cx="215" cy="64" r="4" fill="#FFFFFF" opacity="0.5"/>

  <!-- Smaller floating bubbles -->
  <circle cx="420" cy="50" r="18" fill="url(#bubble-glass)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  <ellipse cx="413" cy="43" rx="5" ry="3.5" fill="#FFFFFF" opacity="0.25" transform="rotate(-20,413,43)"/>

  <circle cx="80" cy="140" r="14" fill="url(#bubble-glass)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <ellipse cx="75" cy="135" rx="4" ry="2.5" fill="#FFFFFF" opacity="0.2" transform="rotate(-15,75,135)"/>

  <circle cx="450" cy="130" r="10" fill="url(#bubble-glass)" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>

  <circle cx="60" cy="60" r="8" fill="url(#bubble-glass)" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>

  <!-- LAUNDRY subtitle -->
  <text x="250" y="170" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif" font-weight="400"
        font-size="18" letter-spacing="12" fill="#6B7280">LAUNDRY</text>

  <!-- Tagline -->
  <text x="250" y="210" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif" font-weight="700"
        font-size="12" letter-spacing="3" fill="#3BA0B5">PICKUP &amp; DELIVERY · MAURICE, LA</text>

  <!-- Slogan -->
  <text x="250" y="250" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif" font-weight="800"
        font-size="11" letter-spacing="2.5" fill="#1B3A4B">DIRTY CLOTHES OUT · CLEAN CLOTHES IN</text>
</svg>
