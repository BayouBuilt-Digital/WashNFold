<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 280" width="560" height="280">
  <!-- Logo Option A: Large bubble centered over the "N" -->
  <!-- FOR: White shirts, natural cotton bags -->

  <defs>
    <radialGradient id="bubble-a" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#64B5F6" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#7CC444" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7CC444" stop-opacity="0.03"/>
    </radialGradient>
  </defs>

  <!-- "Wash" in dark navy -->
  <text x="248" y="130" text-anchor="end"
        font-family="'Nunito', sans-serif" font-weight="900"
        font-size="80" fill="#1B3A4B">Wash</text>

  <!-- "NFold" in brand green -->
  <text x="252" y="130" text-anchor="start"
        font-family="'Nunito', sans-serif" font-weight="900"
        font-size="80" fill="#7CC444">NFold</text>

  <!-- Large bubble over the N -->
  <circle cx="278" cy="95" r="62" fill="url(#bubble-a)" stroke="#64B5F6" stroke-width="2" stroke-opacity="0.5"/>
  <ellipse cx="260" cy="72" rx="18" ry="12" fill="#64B5F6" opacity="0.12" transform="rotate(-20,260,72)"/>
  <circle cx="253" cy="64" r="4" fill="#64B5F6" opacity="0.25"/>

  <!-- Smaller accent bubbles -->
  <circle cx="440" cy="50" r="18" fill="url(#bubble-a)" stroke="#7CC444" stroke-width="1.5" stroke-opacity="0.45"/>
  <ellipse cx="433" cy="43" rx="5" ry="3.5" fill="#7CC444" opacity="0.12" transform="rotate(-20,433,43)"/>

  <circle cx="80" cy="140" r="14" fill="url(#bubble-a)" stroke="#64B5F6" stroke-width="1.2" stroke-opacity="0.4"/>
  <ellipse cx="75" cy="135" rx="4" ry="2.5" fill="#64B5F6" opacity="0.1" transform="rotate(-15,75,135)"/>

  <circle cx="470" cy="130" r="10" fill="url(#bubble-a)" stroke="#7CC444" stroke-width="1" stroke-opacity="0.35"/>
  <circle cx="60" cy="60" r="8" fill="url(#bubble-a)" stroke="#64B5F6" stroke-width="1" stroke-opacity="0.3"/>

  <!-- LAUNDRY subtitle -->
  <text x="280" y="170" text-anchor="middle"
        font-family="'Nunito', sans-serif" font-weight="400"
        font-size="18" letter-spacing="12" fill="#6B7280">LAUNDRY</text>

  <text x="280" y="210" text-anchor="middle"
        font-family="'Nunito', sans-serif" font-weight="700"
        font-size="12" letter-spacing="3" fill="#3BA0B5">PICKUP &amp; DELIVERY · MAURICE, LA</text>

  <text x="280" y="250" text-anchor="middle"
        font-family="'Nunito', sans-serif" font-weight="800"
        font-size="11" letter-spacing="2.5" fill="#1B3A4B">DIRTY CLOTHES OUT · CLEAN CLOTHES IN</text>
</svg>
