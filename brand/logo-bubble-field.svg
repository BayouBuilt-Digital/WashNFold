  <circle cx="28" cy="145" r="16" fill="url(#bm)" stroke="#3BA0B5" stroke-width="1.2" stroke-opacity="0.35"/>
  <ellipse cx="22" cy="137" rx="4.5" ry="3" fill="#64B5F6" opacity="0.08" transform="rotate(-18,22,137)"/>

  <circle cx="55" cy="195" r="10" fill="url(#bb)" stroke="#64B5F6" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="15" cy="210" r="6" fill="url(#bg)" stroke="#7CC444" stroke-width="0.7" stroke-opacity="0.2"/>
  <circle cx="70" cy="118" r="5" fill="url(#bg)" stroke="#7CC444" stroke-width="0.6" stroke-opacity="0.18"/>

