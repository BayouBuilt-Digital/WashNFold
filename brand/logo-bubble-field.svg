<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" width="560" height="300">
  <!-- Logo: Bubble Field — large floating glass bubbles -->
  <!-- FOR: White shirts, natural cotton bags -->
  <!-- PRIMARY BRAND LOGO #3 -->
  <!-- Style: Glassmorphism, iridescent, premium — fewer, bigger, glassier -->

  <defs>
    <!-- Iridescent glass — blue to green shift -->
    <radialGradient id="glass-a" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="25%" stop-color="#64B5F6" stop-opacity="0.14"/>
      <stop offset="65%" stop-color="#7CC444" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#7CC444" stop-opacity="0.02"/>
    </radialGradient>
    <!-- Cool blue glass -->
    <radialGradient id="glass-b" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="30%" stop-color="#64B5F6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#64B5F6" stop-opacity="0.02"/>
    </radialGradient>
    <!-- Warm green glass -->
    <radialGradient id="glass-g" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="30%" stop-color="#7CC444" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7CC444" stop-opacity="0.02"/>
    </radialGradient>
  </defs>

  <!-- ═══ LARGE BUBBLES (hero bubbles — the stars) ═══ -->

  <!-- Large #1 — top left -->
  <circle cx="55" cy="52" r="42" fill="url(#glass-a)" stroke="#64B5F6" stroke-width="1.5" stroke-opacity="0.3"/>
  <ellipse cx="38" cy="32" rx="14" ry="9" fill="#FFFFFF" opacity="0.18" transform="rotate(-22,38,32)"/>
  <circle cx="32" cy="26" r="4" fill="#FFFFFF" opacity="0.3"/>

  <!-- Large #2 — top right -->
  <circle cx="505" cy="45" r="38" fill="url(#glass-g)" stroke="#7CC444" stroke-width="1.5" stroke-opacity="0.3"/>
  <ellipse cx="490" cy="28" rx="12" ry="8" fill="#FFFFFF" opacity="0.16" transform="rotate(-18,490,28)"/>
  <circle cx="484" cy="22" r="3.5" fill="#FFFFFF" opacity="0.28"/>

  <!-- Large #3 — left mid, overlapping behind text -->
  <circle cx="88" cy="155" r="35" fill="url(#glass-b)" stroke="#64B5F6" stroke-width="1.4" stroke-opacity="0.28"/>
  <ellipse cx="73" cy="138" rx="11" ry="7" fill="#FFFFFF" opacity="0.15" transform="rotate(-20,73,138)"/>
  <circle cx="68" cy="133" r="3.5" fill="#FFFFFF" opacity="0.25"/>

  <!-- Large #4 — right mid -->
  <circle cx="500" cy="170" r="32" fill="url(#glass-a)" stroke="#7CC444" stroke-width="1.3" stroke-opacity="0.28"/>
  <ellipse cx="487" cy="155" rx="10" ry="7" fill="#FFFFFF" opacity="0.14" transform="rotate(-15,487,155)"/>
  <circle cx="482" cy="150" r="3" fill="#FFFFFF" opacity="0.24"/>

  <!-- Large #5 — bottom left -->
  <circle cx="65" cy="262" r="30" fill="url(#glass-g)" stroke="#7CC444" stroke-width="1.3" stroke-opacity="0.28"/>
  <ellipse cx="52" cy="248" rx="10" ry="6.5" fill="#FFFFFF" opacity="0.14" transform="rotate(-18,52,248)"/>
  <circle cx="47" cy="243" r="3" fill="#FFFFFF" opacity="0.24"/>

  <!-- Large #6 — bottom right -->
  <circle cx="490" cy="258" r="34" fill="url(#glass-b)" stroke="#64B5F6" stroke-width="1.4" stroke-opacity="0.28"/>
  <ellipse cx="475" cy="242" rx="11" ry="7" fill="#FFFFFF" opacity="0.15" transform="rotate(-20,475,242)"/>
  <circle cx="470" cy="237" r="3.5" fill="#FFFFFF" opacity="0.26"/>

  <!-- Large #7 — top center, floating above wordmark -->
  <circle cx="320" cy="38" r="28" fill="url(#glass-a)" stroke="#3BA0B5" stroke-width="1.2" stroke-opacity="0.25"/>
  <ellipse cx="308" cy="24" rx="9" ry="6" fill="#FFFFFF" opacity="0.14" transform="rotate(-18,308,24)"/>
  <circle cx="303" cy="20" r="3" fill="#FFFFFF" opacity="0.24"/>

  <!-- ═══ MEDIUM BUBBLES (supporting — add rhythm) ═══ -->

  <!-- Medium — top area -->
  <circle cx="165" cy="30" r="16" fill="url(#glass-b)" stroke="#64B5F6" stroke-width="1" stroke-opacity="0.22"/>
  <ellipse cx="158" cy="22" rx="4.5" ry="3" fill="#FFFFFF" opacity="0.1" transform="rotate(-15,158,22)"/>

  <circle cx="430" cy="80" r="14" fill="url(#glass-g)" stroke="#7CC444" stroke-width="0.9" stroke-opacity="0.22"/>
  <ellipse cx="424" cy="73" rx="4" ry="2.8" fill="#FFFFFF" opacity="0.1" transform="rotate(-12,424,73)"/>

  <!-- Medium — mid area -->
  <circle cx="160" cy="110" r="12" fill="url(#glass-g)" stroke="#7CC444" stroke-width="0.9" stroke-opacity="0.2"/>

  <circle cx="445" cy="120" r="13" fill="url(#glass-b)" stroke="#64B5F6" stroke-width="0.9" stroke-opacity="0.2"/>

  <!-- Medium — bottom area -->
  <circle cx="170" cy="250" r="14" fill="url(#glass-a)" stroke="#3BA0B5" stroke-width="0.9" stroke-opacity="0.22"/>

  <circle cx="400" cy="270" r="12" fill="url(#glass-g)" stroke="#7CC444" stroke-width="0.8" stroke-opacity="0.2"/>

  <!-- Medium — floating near text -->
  <circle cx="240" cy="80" r="11" fill="url(#glass-b)" stroke="#64B5F6" stroke-width="0.8" stroke-opacity="0.18"/>

  <circle cx="350" cy="260" r="10" fill="url(#glass-g)" stroke="#7CC444" stroke-width="0.7" stroke-opacity="0.18"/>

  <!-- ═══ WORDMARK (on top of everything) ═══ -->
  <text x="248" y="150" text-anchor="end"
        font-family="'Nunito', sans-serif" font-weight="900"
        font-size="80" fill="#1B3A4B">Wash</text>
  <text x="252" y="150" text-anchor="start"
        font-family="'Nunito', sans-serif" font-weight="900"
        font-size="80" fill="#7CC444">NFold</text>

  <!-- Subtitle -->
  <text x="280" y="190" text-anchor="middle"
        font-family="'Nunito', sans-serif" font-weight="400"
        font-size="18" letter-spacing="12" fill="#6B7280">LAUNDRY</text>

  <text x="280" y="230" text-anchor="middle"
        font-family="'Nunito', sans-serif" font-weight="700"
        font-size="12" letter-spacing="3" fill="#3BA0B5">PICKUP &amp; DELIVERY · MAURICE, LA</text>

  <text x="280" y="270" text-anchor="middle"
        font-family="'Nunito', sans-serif" font-weight="800"
        font-size="11" letter-spacing="2.5" fill="#1B3A4B">DIRTY CLOTHES OUT · CLEAN CLOTHES IN</text>
</svg>
