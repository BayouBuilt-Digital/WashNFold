  <circle cx="42" cy="28" r="22" fill="url(#bb)" stroke="#64B5F6" stroke-width="1.5" stroke-opacity="0.4"/>
  <ellipse cx="34" cy="18" rx="6" ry="4" fill="#64B5F6" opacity="0.12" transform="rotate(-20,34,18)"/>
  <circle cx="30" cy="14" r="2.5" fill="#64B5F6" opacity="0.25"/>

  <circle cx="85" cy="55" r="11" fill="url(#bg)" stroke="#7CC444" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="18" cy="72" r="7" fill="url(#bb)" stroke="#64B5F6" stroke-width="0.8" stroke-opacity="0.25"/>
  <circle cx="65" cy="14" r="5" fill="url(#bg)" stroke="#7CC444" stroke-width="0.6" stroke-opacity="0.2"/>

  <!-- Top-right cluster -->
  <circle cx="498" cy="22" r="18" fill="url(#bg)" stroke="#7CC444" stroke-width="1.5" stroke-opacity="0.4"/>
  <ellipse cx="491" cy="14" rx="5" ry="3.5" fill="#7CC444" opacity="0.1" transform="rotate(-15,491,14)"/>
  <circle cx="487" cy="10" r="2" fill="#7CC444" opacity="0.22"/>

  <circle cx="535" cy="55" r="13" fill="url(#bb)" stroke="#64B5F6" stroke-width="1.2" stroke-opacity="0.35"/>
  <circle cx="460" cy="48" r="8" fill="url(#bg)" stroke="#7CC444" stroke-width="0.8" stroke-opacity="0.25"/>
  <circle cx="520" cy="18" r="5" fill="url(#bm)" stroke="#3BA0B5" stroke-width="0.6" stroke-opacity="0.2"/>

