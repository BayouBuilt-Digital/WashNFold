  <ellipse cx="503" cy="243" rx="5" ry="3.5" fill="#7CC444" opacity="0.1" transform="rotate(-18,503,243)"/>
  <circle cx="500" cy="240" r="2" fill="#7CC444" opacity="0.2"/>

  <circle cx="468" cy="278" r="9" fill="url(#bb)" stroke="#64B5F6" stroke-width="0.8" stroke-opacity="0.25"/>
  <circle cx="540" cy="270" r="6" fill="url(#bm)" stroke="#3BA0B5" stroke-width="0.6" stroke-opacity="0.18"/>

  <!-- Scattered singles — floating in gaps -->
  <circle cx="140" cy="280" r="7" fill="url(#bm)" stroke="#3BA0B5" stroke-width="0.7" stroke-opacity="0.2"/>
  <circle cx="420" cy="280" r="6" fill="url(#bb)" stroke="#64B5F6" stroke-width="0.6" stroke-opacity="0.18"/>
  <circle cx="180" cy="95" r="4" fill="url(#bg)" stroke="#7CC444" stroke-width="0.5" stroke-opacity="0.15"/>
  <circle cx="380" cy="85" r="5" fill="url(#bb)" stroke="#64B5F6" stroke-width="0.5" stroke-opacity="0.15"/>
  <circle cx="320" cy="12" r="4" fill="url(#bg)" stroke="#7CC444" stroke-width="0.5" stroke-opacity="0.12"/>
  <circle cx="200" cy="270" r="5" fill="url(#bb)" stroke="#64B5F6" stroke-width="0.5" stroke-opacity="0.14"/>
  <circle cx="350" cy="275" r="4" fill="url(#bg)" stroke="#7CC444" stroke-width="0.5" stroke-opacity="0.12"/>

  <!-- ═══ WORDMARK ═══ -->
  <text x="248" y="150" text-anchor="end"
        font-family="'Nunito', sans-serif" font-weight="900"
        font-size="80" fill="#1B3A4B">Wash</text>
  <text x="252" y="150" text-anchor="start"
        font-family="'Nunito', sans-serif" font-weight="900"
        font-size="80" fill="#7CC444">NFold</text>

  <!-- Subtitle -->
  <text x="280" y="190" text-anchor="middle"
        font-family="'Nunito', sans-serif" font-weight="400"
        font-size="18" letter-spacing="12" fill="#6B7280">LAUNDRY</text>

  <text x="280" y="230" text-anchor="middle"
        font-family="'Nunito', sans-serif" font-weight="700"
        font-size="12" letter-spacing="3" fill="#3BA0B5">PICKUP &amp; DELIVERY · MAURICE, LA</text>

  <text x="280" y="270" text-anchor="middle"
        font-family="'Nunito', sans-serif" font-weight="800"
